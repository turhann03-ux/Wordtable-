// Demo-only client-side helpers.
// NOTE: This app has no backend. Hashing here only avoids storing/displaying
// plaintext passwords in memory/devtools during the demo — it is NOT real
// authentication security. A production version must verify credentials on
// a server and never ship an admin password (hashed or not) in the client bundle.
async function sha256Hex(text) {
  const bytes = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

// Storage adapter.
//
// In the Claude artifact host, `window.storage` gives real, genuine
// persistence across sessions (per-user and shared). When this project runs
// standalone (e.g. `npm run dev`, or once you connect a real backend), there
// is no `window.storage`, so we fall back to `localStorage` wrapped in the
// same async shape. Swap `localFallback` for real API calls when you add a
// server — every call site in the app already awaits these functions, so the
// rest of the codebase doesn't need to change.
const hasArtifactStorage = () => typeof window !== "undefined" && !!window.storage;

const localFallback = {
  async get(key, shared = false) {
    const raw = localStorage.getItem((shared ? "shared:" : "priv:") + key);
    if (raw === null) throw new Error("not found");
    return { key, value: raw, shared };
  },
  async set(key, value, shared = false) {
    localStorage.setItem((shared ? "shared:" : "priv:") + key, value);
    return { key, value, shared };
  },
  async delete(key, shared = false) {
    localStorage.removeItem((shared ? "shared:" : "priv:") + key);
    return { key, deleted: true, shared };
  },
  async list(prefix = "", shared = false) {
    const ns = shared ? "shared:" : "priv:";
    const keys = Object.keys(localStorage)
      .filter((k) => k.startsWith(ns + prefix))
      .map((k) => k.slice(ns.length));
    return { keys, prefix, shared };
  },
};

async function storageGet(key, shared = false) {
  try {
    const backend = hasArtifactStorage() ? window.storage : localFallback;
    const res = await backend.get(key, shared);
    return res ? JSON.parse(res.value) : null;
  } catch {
    return null;
  }
}

async function storageSet(key, value, shared = false) {
  const backend = hasArtifactStorage() ? window.storage : localFallback;
  try {
    await backend.set(key, JSON.stringify(value), shared);
    return true;
  } catch {
    return false;
  }
}

async function storageList(prefix = "", shared = false) {
  try {
    const backend = hasArtifactStorage() ? window.storage : localFallback;
    const res = await backend.list(prefix, shared);
    return res ? res.keys : [];
  } catch {
    return [];
  }
}


// Haversine distance in km between two lat/lng points.
function distanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLng = ((lng2 - lng1) * Math.PI) / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Wraps the browser geolocation API in a promise. Resolves null if denied,
// unsupported, or the iframe sandbox blocks it — callers should treat "near
// me" as unavailable rather than erroring.
function getBrowserLocation() {
  return new Promise((resolve) => {
    if (typeof navigator === "undefined" || !navigator.geolocation) {
      resolve(null);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve(null),
      { timeout: 5000 }
    );
  });
}

// "Open now" based on the restaurant's daily openMin/closeMin (minutes from
// midnight) and the visitor's local time. Demo simplification: same hours
// every day of the week.
function isOpenNow(restaurant, now = new Date()) {
  const minutesNow = now.getHours() * 60 + now.getMinutes();
  return minutesNow >= restaurant.openMin && minutesNow <= restaurant.closeMin;
}


// Minimal hash-based router — no dependency needed, works in the artifact
// sandbox (no server-side routes required) and in a normal static deploy.
// Routes used by this app: "#/", "#/owner", "#/login", "#/admin".
// Query params on "#/" (e.g. "#/?cuisine=turks&q=foo") are preserved so
// filtered views are shareable/bookmarkable.
function useHashRoute() {
  const parse = () => {
    const hash = window.location.hash.replace(/^#/, "") || "/";
    const [path, queryString] = hash.split("?");
    return { path: path || "/", params: new URLSearchParams(queryString || "") };
  };

  const [route, setRoute] = useState(parse);

  useEffect(() => {
    const onHashChange = () => setRoute(parse());
    window.addEventListener("hashchange", onHashChange);
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);

  const navigate = useCallback((path, params) => {
    const qs = params ? new URLSearchParams(params).toString() : "";
    window.location.hash = qs ? `${path}?${qs}` : path;
  }, []);

  return [route, navigate];
}

function LogoMark({ size = 36 }) {
  const items = [
    { Icon: Beef, color: BRICK, angle: -90 },
    { Icon: Fish, color: CANAL, angle: -18 },
    { Icon: Coffee, color: GOLD, angle: 54 },
    { Icon: Wine, color: DELFT, angle: 126 },
    { Icon: UtensilsCrossed, color: BRICK, angle: 198 },
  ];
  const r = size * 0.62;
  return (
    <div className="relative shrink-0" style={{ width: size * 2.1, height: size * 2.1 }}>
      <div className="absolute inset-0 rounded-full" style={{ border: `2px solid ${INK}`, background: PAPER }} />
      {items.map(({ Icon, color, angle }, i) => {
        const rad = (angle * Math.PI) / 180;
        const cx = size * 1.05 + r * Math.cos(rad) - size * 0.24;
        const cy = size * 1.05 + r * Math.sin(rad) - size * 0.24;
        return (
          <div key={i} className="absolute flex items-center justify-center rounded-full"
            style={{ width: size * 0.48, height: size * 0.48, left: cx, top: cy, background: color, border: `1.5px solid ${INK}` }}>
            <Icon size={size * 0.26} color={PAPER} />
          </div>
        );
      })}
      <div className="absolute flex items-center justify-center rounded-full"
        style={{ width: size * 0.6, height: size * 0.6, left: size * 1.05 - size * 0.3, top: size * 1.05 - size * 0.3, background: INK }}>
        <Globe size={size * 0.32} color={PAPER} />
      </div>
    </div>
  );
}

function RestaurantCard({

  const [reviewsOpen, setReviewsOpen] = useState(false);
  const [aboutOpen, setAboutOpen] = useState(false);

  // Real view counter: fires once per card mount (i.e. once per page load
  // that this card was rendered/scrolled into the results), persisted via
  // the shared storage-backed `analytics` state in App.jsx.
  const viewedRef = useRef(false);
  useEffect(() => {
    if (!viewedRef.current) {
      viewedRef.current = true;
      recordView && recordView(r.id);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [r.id]);

  const allReviews = [...r.reviews, ...(localReviews[r.id] || [])];
  const draft = reviewDrafts[r.id] || { name: "", text: "" };
  const openNow = isOpenNow(r);

  const submitReview = () => {
    if (!draft.name || !draft.text) return;
    setLocalReviews((prev) => ({ ...prev, [r.id]: [...(prev[r.id] || []), draft] }));
    setReviewDrafts((prev) => ({ ...prev, [r.id]: { name: "", text: "" } }));

              return (

        {/* Reviews */}
        <button onClick={() => setReviewsOpen(!reviewsOpen)}
          className="flex items-center justify-center gap-1 text-xs font-medium font-display py-1.5 transition-colors hover:bg-gray-50"
          style={{ border: `2px solid ${INK}`, background: "#fff" }}
          aria-expanded={reviewsOpen}>
          {t.reviews_title} ({allReviews.length})
          {reviewsOpen ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
        </button>
        {reviewsOpen && (
          <div className="flex flex-col gap-2 mt-1">
            {allReviews.length === 0 && <p className="text-xs" style={{ color: "#999" }}>{t.reviews_none}</p>}
            {allReviews.map((rev, i) => (
              <div key={i} className="text-xs p-2" style={{ background: PAPER, border: `1px solid ${INK}` }}>
                <p className="font-semibold">{rev.name}</p>
                <p style={{ color: "#555" }}>{rev.text}</p>
              </div>
            ))}
            <div className="flex flex-col gap-1.5 mt-1">
              <input
                value={draft.name}
                onChange={(e) => setReviewDrafts((p) => ({ ...p, [r.id]: { ...draft, name: e.target.value } }))}

                className="px-2 py-1.5 text-xs input-field"

              <button onClick={submitReview} className="text-xs font-medium py-1.5 btn-primary">
                <Send size={12} /> {t.review_submit}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


const DIETARY_TAGS = ["vegan", "vegetarian-friendly", "halal", "pescatarian"];
const dietaryKey = (tag) => "dietary_" + tag.replace(/-/g, "_");

function DiscoverView({
  t, lang, query, setQuery, activeCuisine, setActiveCuisine,
  localReviews, setLocalReviews, reviewDrafts, setReviewDrafts,
  recordView, recordContactClick,
}) {
  const cuisineName = (id) => CUISINES.find((c) => c.id === id)?.name[lang] || id;

  const [dietaryFilter, setDietaryFilter] = useState(new Set());
  const [openNowOnly, setOpenNowOnly] = useState(false);
  const [nearMe, setNearMe] = useState(false);
  const [userLocation, setUserLocation] = useState(null);
  const [locationDenied, setLocationDenied] = useState(false);

  const toggleDietary = (tag) => setDietaryFilter((prev) => {
    const next = new Set(prev);
    next.has(tag) ? next.delete(tag) : next.add(tag);
    return next;
  });

  const handleNearMe = async () => {
    if (nearMe) { setNearMe(false); return; }
    const loc = await getBrowserLocation();
    if (!loc) { setLocationDenied(true); return; }
    setUserLocation(loc);
    setNearMe(true);
    setLocationDenied(false);
  };

  const anyFilterActive = dietaryFilter.size > 0 || openNowOnly || nearMe;
  const clearFilters = () => {
    setDietaryFilter(new Set());
    setOpenNowOnly(false); setNearMe(false);
  };

  const filtered = useMemo(() => {
    let list = RESTAURANTS.filter((r) => {
      const matchesCuisine = activeCuisine === "all" || r.cuisine === activeCuisine;
      const q = query.trim().toLowerCase();
      const matchesQuery =
        !q || r.name.toLowerCase().includes(q) || r.city.toLowerCase().includes(q) ||
        cuisineName(r.cuisine).toLowerCase().includes(q);
      const matchesDietary = dietaryFilter.size === 0 || [...dietaryFilter].every((tag) => r.dietary?.includes(tag));
      const matchesOpen = !openNowOnly || isOpenNow(r);
      return matchesCuisine && matchesQuery && matchesDietary && matchesOpen;
    });
    if (nearMe && userLocation) {
      list = [...list]
        .map((r) => ({ ...r, _distanceKm: distanceKm(userLocation.lat, userLocation.lng, r.lat, r.lng) }))
        .sort((a, b) => a._distanceKm - b._distanceKm);
    }
    return list;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeCuisine, query, lang, dietaryFilter, openNowOnly, nearMe, userLocation]);

  const newlyAdded = RESTAURANTS.filter((r) => r.isNew);

  return (
    <main>
      {/* Hero */}
      <section className="relative">
        <Skyline />
        <Sticker Icon={Flower2} color="#A8462F" style={{ top: 6, insetInlineStart: 16, transform: "rotate(-8deg)" }} />
        <Sticker Icon={Coffee} color="#C79A3D" style={{ top: 40, insetInlineEnd: 20, transform: "rotate(6deg)" }} />
        <Sticker Icon={Croissant} color="#2A4A6B" style={{ top: 90, insetInlineStart: "8%", transform: "rotate(10deg)" }} />
        <div className="px-4 py-6 max-w-3xl mx-auto">
          <h1 className="font-display font-bold leading-tight" style={{ fontSize: "2rem" }}>{t.hero_title}</h1>
          <p className="mt-2 text-sm leading-relaxed" style={{ color: "#4a4744" }}>{t.hero_subtitle}</p>
          <div className="mt-4 flex items-center gap-2 px-3 py-2" style={{ border: `2px solid ${INK}`, background: "#fff" }}>
            <Search size={16} color="#777" />
            <input
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder={t.search_placeholder}
              className="flex-1 text-sm outline-none bg-transparent"
              aria-label={t.search_placeholder}
            />
          </div>
        </div>
      </section>

      {/* New arrivals */}
      {newlyAdded.length > 0 && (
        <section className="px-4 py-3 max-w-3xl mx-auto">
          <h2 className="font-display font-bold text-base mb-2 flex items-center gap-1.5">
            <Sparkles size={16} color={CANAL} /> {t.new_title}
          </h2>
          <div className="flex gap-3 overflow-x-auto pb-1">
            {newlyAdded.map((r) => {
              const Icon = CUISINES.find((c) => c.id === r.cuisine)?.icon || (() => null);
              return (
                <div key={r.id} className="minw-200 flex-shrink-0 p-2.5" style={{ border: `2px solid ${INK}`, background: "#fff" }}>
                  <div className="flex items-center gap-2">
                    <span className="p-1" style={{ background: r.color }}><Icon size={14} color={PAPER} /></span>
                    <p className="font-display font-bold text-sm">{r.name}</p>
                  </div>
                  <p className="text-11 mt-1" style={{ color: "#666" }}>{cuisineName(r.cuisine)} · {r.city}</p>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {/* Category filters */}
      <section className="px-4 py-3 overflow-x-auto max-w-3xl mx-auto">
        <div className="flex gap-2 w-max">
          <button
            onClick={() => setActiveCuisine("all")}
            className="font-mono text-xs font-medium px-3 py-1.5 whitespace-nowrap transition-colors"
            style={{
              border: `2px solid ${INK}`,
              background: activeCuisine === "all" ? INK : PAPER,
              color: activeCuisine === "all" ? PAPER : INK,
            }}
            aria-pressed={activeCuisine === "all"}>
            {t.cat_all}
          </button>
          {CUISINES.map((c) => (
            <button
              key={c.id}
              onClick={() => setActiveCuisine(c.id)}
              className="font-mono text-xs font-medium px-3 py-1.5 whitespace-nowrap flex items-center gap-1.5 transition-colors"
              style={{
                border: `2px solid ${INK}`,
                background: activeCuisine === c.id ? c.color : PAPER,
                color: INK,
              }}
              aria-pressed={activeCuisine === c.id}>
              <c.icon size={13} /> {c.name[lang]}
            </button>
          ))}
        </div>
      </section>

      {/* Dietary / open-now / near-me filters */}
      <section className="px-4 py-2 max-w-3xl mx-auto">
        <div className="flex gap-1.5 flex-wrap items-center">
          <button onClick={() => setOpenNowOnly((v) => !v)} aria-pressed={openNowOnly}
            className="flex items-center gap-1 font-mono text-xs font-medium px-2 py-1 transition-colors"
            style={{ border: `2px solid ${INK}`, background: openNowOnly ? CANAL : PAPER, color: openNowOnly ? PAPER : INK }}>
            <Clock3 size={12} /> {t.filter_open_now}
          </button>
          <button onClick={handleNearMe} aria-pressed={nearMe}
            className="flex items-center gap-1 font-mono text-xs font-medium px-2 py-1 transition-colors"
            style={{ border: `2px solid ${INK}`, background: nearMe ? DELFT : PAPER, color: nearMe ? PAPER : INK }}>
            <MapPin size={12} /> {t.filter_near_me}
          </button>
          {anyFilterActive && (
            <button onClick={clearFilters} className="flex items-center gap-1 text-xs underline" style={{ color: "#888" }}>
              <X size={12} /> {t.filter_clear}
            </button>
          )}
        </div>
        <div className="flex gap-1.5 flex-wrap items-center mt-1.5">
          {DIETARY_TAGS.map((tag) => (
            <button key={tag} onClick={() => toggleDietary(tag)} aria-pressed={dietaryFilter.has(tag)}
              className="font-mono text-11 font-medium px-2 py-1 transition-colors"
              style={{ border: `2px solid ${INK}`, background: dietaryFilter.has(tag) ? GOLD : PAPER, color: INK }}>
              {t[dietaryKey(tag)]}
            </button>
          ))}
        </div>
        {locationDenied && <p className="text-11 mt-1" style={{ color: "#999" }}>{t.filter_near_me_denied}</p>}
      </section>

      {/* Ad Banner */}
      <section className="px-4 py-2 max-w-3xl mx-auto">
        <AdBanner t={t} />
      </section>

      {/* Restaurant grid */}
      <section className="px-4 py-4 max-w-3xl mx-auto">
        <h2 className="font-display font-bold text-lg mb-3">{t.section_title}</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          {filtered.map((r) => (
            <RestaurantCard
              key={r.id}
              r={r}
              t={t}
              lang={lang}
              localReviews={localReviews}
              setLocalReviews={setLocalReviews}
              reviewDrafts={reviewDrafts}
              setReviewDrafts={setReviewDrafts}
              recordView={recordView}
              recordContactClick={recordContactClick}
            />
          ))}
        </div>
        {filtered.length === 0 && (
          <p className="text-sm text-center py-8" style={{ color: "#999" }}>No restaurants found.</p>
        )}
      </section>
    </main>
  );
}

function AuthView({
  t, authView, setAuthView, authForm, setAuthForm, authError, setAuthError,
  handleSignup, handleLogin, resetEmail, setResetEmail, handleSendResetCode,
  resetCode, resetCodeInput, setResetCodeInput, resetNewPassword, setResetNewPassword,
  handleResetPassword, resetDone, setResetDone,
}) {
  const inputStyle = { border: `2px solid ${INK}`, background: "#fff" };

  if (authView === "forgot" || authView === "reset") {
    return (
      <main className="px-4 py-6 max-w-md mx-auto">
        <div className="flex items-center gap-2 mb-4">
          <KeyRound size={20} />
          <h1 className="font-display font-bold text-xl">{t.auth_reset_title}</h1>

        {authView === "forgot" && (
          <form onSubmit={handleSendResetCode} className="flex flex-col gap-2.5">
            <p className="text-xs" style={{ color: "#555" }}>{t.auth_reset_body}</p>
            <input type="email" placeholder={t.auth_email} value={resetEmail} required
              onChange={(e) => setResetEmail(e.target.value)} className="px-3 py-2.5 text-sm" style={inputStyle} />
            {authError && <p className="text-xs" style={{ color: BRICK }}>{authError}</p>}
            <button type="submit" className="btn-primary">{t.auth_reset_send}</button>
          </form>
        )}

        {authView === "reset" && !resetDone && (
          <form onSubmit={handleResetPassword} className="flex flex-col gap-2.5">
            <div className="p-2.5 text-xs font-mono" style={{ background: GOLD, border: `1px solid ${INK}` }}>
              {t.auth_reset_code_sent} <strong>{resetCode}</strong>
            </div>
            <input type="text" placeholder={t.auth_reset_code_label} value={resetCodeInput} required
              onChange={(e) => setResetCodeInput(e.target.value)} className="px-3 py-2.5 text-sm" style={inputStyle} />
            <input type="password" placeholder={t.auth_reset_new_password} value={resetNewPassword} required
              onChange={(e) => setResetNewPassword(e.target.value)} className="px-3 py-2.5 text-sm" style={inputStyle} />
            {authError && <p className="text-xs" style={{ color: BRICK }}>{authError}</p>}
            <button type="submit" className="btn-primary">{t.auth_reset_submit}</button>
          </form>
        )}

        {resetDone && (
          <div className="flex flex-col gap-3">
            <div className="p-3 flex items-center gap-2" style={{ border: `2px solid ${INK}`, background: "#fff" }}>
              <Check size={18} color={CANAL} /><span className="text-sm">{t.auth_reset_success}</span>
            </div>
            <button onClick={() => { setAuthView("login"); setResetDone(false); setAuthError(""); }}
              className="text-sm font-medium underline">{t.auth_back_to_login}</button>
          </div>
        )}

        {authView === "forgot" && (
          <button onClick={() => { setAuthView("login"); setAuthError(""); }} className="mt-3 text-xs font-medium underline">
            {t.auth_back_to_login}
          </button>
        )}
      </main>
    );
  }

  const isSignup = authView === "signup";
  return (
    <main className="px-4 py-6 max-w-md mx-auto">
      <div className="flex items-center gap-2 mb-4">
        <Lock size={20} />
        <h1 className="font-display font-bold text-xl">{isSignup ? t.auth_signup_title : t.auth_login_title}</h1>
      </div>
      <form onSubmit={isSignup ? handleSignup : handleLogin} className="flex flex-col gap-2.5">
        {isSignup && (
          <input type="text" name="website" tabIndex={-1} autoComplete="off"
            value={authForm.website} onChange={(e) => setAuthForm((f) => ({ ...f, website: e.target.value }))}
            style={{ position: "absolute", left: "-9999px", width: 1, height: 1, opacity: 0 }}
            aria-hidden="true" />
        )}
        {isSignup && (
          <input type="text" placeholder={t.auth_business_name} value={authForm.businessName} required
            onChange={(e) => setAuthForm((f) => ({ ...f, businessName: e.target.value }))}
            className="px-3 py-2.5 text-sm" style={inputStyle} />
        )}
        <input type="email" placeholder={t.auth_email} value={authForm.email} required
          onChange={(e) => setAuthForm((f) => ({ ...f, email: e.target.value }))} className="px-3 py-2.5 text-sm" style={inputStyle} />
        <input type="password" placeholder={t.auth_password} value={authForm.password} required
          onChange={(e) => setAuthForm((f) => ({ ...f, password: e.target.value }))} className="px-3 py-2.5 text-sm" style={inputStyle} />
        {isSignup && (
          <input type="password" placeholder={t.auth_confirm_password} value={authForm.confirmPassword} required
            onChange={(e) => setAuthForm((f) => ({ ...f, confirmPassword: e.target.value }))}
            className="px-3 py-2.5 text-sm" style={inputStyle} />
        )}
        {authError && <p className="text-xs" style={{ color: BRICK }}>{authError}</p>}
        <button type="submit" className="btn-primary">
          <LogIn size={16} /> {isSignup ? t.auth_signup_button : t.auth_login_button}
        </button>
      </form>
      <div className="flex flex-col gap-1.5 mt-3">
        {!isSignup && (
          <button onClick={() => { setAuthView("forgot"); setAuthError(""); }} className="text-xs font-medium underline text-left">
            {t.auth_forgot_password}
          </button>
        )}
        <button onClick={() => { setAuthView(isSignup ? "login" : "signup"); setAuthError(""); }}
          className="text-xs font-medium underline text-left">
          {isSignup ? t.auth_switch_to_login : t.auth_switch_to_signup}
        </button>
      </div>
    </main>
  );
}

          </h2>
          <div className="p-3 flex items-start gap-2" style={{ border: `2px solid ${INK}`, background: "#fff" }}>
            <div className="flex-1 flex items-center gap-2 text-xs" style={{ color: "#666" }}>
              <Eye size={14} /> <MousePointerClick size={14} className="ml-1" />
              <span>{t.dashboard_none}</span>
            </div>
          </div>
        </>
      )}

      {checkoutOpen && <CheckoutModal t={t} onClose={() => setCheckoutOpen(false)} />}

      <h2 className="font-display font-bold text-lg mt-6 mb-2">{t.form_title}</h2>
      {submitted ? (
        <div className="p-4 flex items-center gap-2" style={{ border: `2px solid ${INK}`, background: "#fff" }}>
          <Check size={18} color={CANAL} />
          <span className="text-sm">
            {form.name} — {form.city} — {form.cuisine === "other"
              ? (form.cuisineOther || t.cuisine_other)
              : (CUISINES.find((c) => c.id === form.cuisine)?.name[lang] ?? form.cuisine)}
          </span>
        </div>
      ) : (
        <form onSubmit={handleSubmit} className="flex flex-col gap-2.5">
          <input type="text" name="website" tabIndex={-1} autoComplete="off"
            value={form.website} onChange={(e) => setForm((f) => ({ ...f, website: e.target.value }))}
            style={{ position: "absolute", left: "-9999px", width: 1, height: 1, opacity: 0 }}
            aria-hidden="true" />
          <input type="text" placeholder={t.form_name} value={form.name}
            onChange={(e) => setForm((f) => ({ ...f, name: e.target.value }))}
            className="input-field" required />
          <div className="flex gap-2">
            <input type="text" placeholder={t.form_city} value={form.city}
              onChange={(e) => setForm((f) => ({ ...f, city: e.target.value }))}
              className="flex-1 input-field" required />
            <select value={form.cuisine} onChange={(e) => setForm((f) => ({ ...f, cuisine: e.target.value }))}
              className="flex-1 input-field">
              {CUISINES.map((c) => (
                <option key={c.id} value={c.id}>{c.name[lang]}</option>
              ))}
              <option value="other">{t.cuisine_other}</option>
            </select>
          </div>
          {form.cuisine === "other" && (
            <input type="text" placeholder={t.cuisine_label} value={form.cuisineOther}
              onChange={(e) => setForm((f) => ({ ...f, cuisineOther: e.target.value }))}
              className="input-field" />
          )}
          <textarea placeholder={t.form_description} value={form.description} rows={3}
            onChange={(e) => setForm((f) => ({ ...f, description: e.target.value }))}
            className="input-field resize-none" />
          <input type="text" placeholder={t.form_video} value={form.video}
            onChange={(e) => setForm((f) => ({ ...f, video: e.target.value }))}
            className="input-field" />
          <div className="flex items-center gap-1.5 text-11" style={{ color: "#888" }}>
            <Camera size={13} /> {t.form_photos_note}
          </div>
          <button type="submit" className="btn-primary">
            {t.form_submit} <ArrowRight size={16} />
          </button>
        </form>
      )}
    </main>
  );
}


function App() {
  const [lang, setLang] = useState("nl");
  const t = STRINGS[lang];

  // ---- Routing ----
  // "#/" = discover, "#/owner" = owner/auth flow, "#/admin" = admin panel.
  // Query params on "#/" carry the active cuisine/search so filtered views
  // are shareable and survive a refresh.
  const [route, navigate] = useHashRoute();
  const view = route.path === "/admin" ? "admin" : route.path === "/owner" ? "owner" : "discover";
  const setView = (v) => navigate(v === "discover" ? "/" : `/${v}`);

  const [activeCuisine, setActiveCuisine] = useState(route.params.get("cuisine") || "all");
  const [query, setQuery] = useState(route.params.get("q") || "");
  useEffect(() => {
    if (view !== "discover") return;
    const params = {};
    if (activeCuisine !== "all") params.cuisine = activeCuisine;
    if (query) params.q = query;
    navigate("/", params);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeCuisine, query]);

  const [localReviews, setLocalReviews] = useState({});
  const [reviewDrafts, setReviewDrafts] = useState({});

  const [form, setForm] = useState({ name: "", city: "", cuisine: "turks", cuisineOther: "", description: "", video: "", website: "" });
  const [submitted, setSubmitted] = useState(false);
  const [formStartedAt, setFormStartedAt] = useState(() => Date.now());

  // ---- Owner auth (demo-only) ----
  const [ownersDB, setOwnersDB] = useState([]);
  const [currentOwner, setCurrentOwner] = useState(null);
  const [authView, setAuthView] = useState("login");
  const [authForm, setAuthForm] = useState({ email: "", password: "", confirmPassword: "", businessName: "", website: "" });
  const [authError, setAuthError] = useState("");
  const [authStartedAt, setAuthStartedAt] = useState(() => Date.now());
  const [resetEmail, setResetEmail] = useState("");
  const [resetCode, setResetCode] = useState("");
  const [resetCodeInput, setResetCodeInput] = useState("");
  const [resetNewPassword, setResetNewPassword] = useState("");
  const [resetDone, setResetDone] = useState(false);

  // ---- Admin ----
  // SHA-256 of "worldtable2026" — still demo-only, see lib/hash.js.
  const ADMIN_PASSWORD_HASH = "32c6cf36e68915abf29054af07cca7d7936504bfb0c9c8eee990a33422073a18";
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminPasswordInput, setAdminPasswordInput] = useState("");
  const [adminError, setAdminError] = useState("");

  // ---- Analytics (real counters, persisted) ----
  const [analytics, setAnalytics] = useState({});

  // ---- Persistence ----
  // ownersDB and analytics use *shared* storage so the admin panel and the
  // live directory reflect activity from everyone using this artifact —
  // that also means this demo data is visible to anyone who opens it.
  // Consent is personal (per-browser) since it's just a dismissed-banner flag.
  const [dataLoaded, setDataLoaded] = useState(false);
  const [consentAccepted, setConsentAccepted] = useState(true);
  useEffect(() => {
    (async () => {
      const [owners, analyticsData, consent] = await Promise.all([
        storageGet("owners", true),
        storageGet("analytics", true),
        storageGet("consent", false),
      ]);
      setOwnersDB(owners || []);
      setAnalytics(analyticsData || {});
      setConsentAccepted(consent === true);
      setDataLoaded(true);
    })();
  }, []);
  useEffect(() => { if (dataLoaded) storageSet("owners", ownersDB, true); }, [ownersDB, dataLoaded]);
  useEffect(() => { if (dataLoaded) storageSet("analytics", analytics, true); }, [analytics, dataLoaded]);

  const acceptConsent = () => {
    setConsentAccepted(true);
    storageSet("consent", true, false);
  };

  const recordView = useCallback((id) => {
    setAnalytics((prev) => {
      const cur = prev[id] || { views: 0, clicks: 0 };
      return { ...prev, [id]: { ...cur, views: cur.views + 1 } };
    });
  }, []);
  const recordContactClick = useCallback((id) => {
    setAnalytics((prev) => {
      const cur = prev[id] || { views: 0, clicks: 0 };
      return { ...prev, [id]: { ...cur, clicks: cur.clicks + 1 } };
    });
  }, []);

  const handleAdminLogin = async (e) => {
    e.preventDefault();
    const hash = await sha256Hex(adminPasswordInput);
    if (hash === ADMIN_PASSWORD_HASH) {
      setAdminAuthed(true);
      setAdminError("");
    } else {
      setAdminError(t.admin_error);
    }
  };

  const setOwnerApproval = (email, approved) => {
    setOwnersDB((prev) => prev.map((o) => (o.email === email ? { ...o, approved } : o)));
    setCurrentOwner((prev) => (prev && prev.email === email ? { ...prev, approved } : prev));
  };

  // Basic anti-spam: a hidden honeypot field that only bots fill in, plus a
  // minimum time-on-form check (real users take at least ~2s; scripted
  // submissions are usually instant). Neither is bulletproof, but both are
  // free, invisible to real users, and catch the majority of naive bots.
  const looksLikeSpam = (honeypotValue, startedAt) => {
    if (honeypotValue) return true;
    if (Date.now() - startedAt < 1500) return true;
    return false;
  };

  const handleSignup = async (e) => {
    e.preventDefault();
    setAuthError("");
    if (looksLikeSpam(authForm.website, authStartedAt)) {
      setAuthError(t.spam_error);
      return;
    }
    const email = normalizeEmail(authForm.email);
    if (ownersDB.some((o) => o.email === email)) {
      setAuthError(t.auth_error_exists);
      return;
    }
    if (authForm.password !== authForm.confirmPassword) {
      setAuthError(t.auth_error_mismatch);
      return;
    }
    const passwordHash = await sha256Hex(authForm.password);
    const newOwner = { email, passwordHash, businessName: authForm.businessName, approved: false };
    setOwnersDB((prev) => [...prev, newOwner]);
    setCurrentOwner(newOwner);
    setForm((f) => ({ ...f, name: authForm.businessName }));
  };

  const handleLogin = async (e) => {
    e.preventDefault();
    setAuthError("");
    if (looksLikeSpam(authForm.website, authStartedAt)) {
      setAuthError(t.spam_error);
      return;
    }
    const email = normalizeEmail(authForm.email);
    const passwordHash = await sha256Hex(authForm.password);
    const found = ownersDB.find((o) => o.email === email && o.passwordHash === passwordHash);
    if (!found) {
      setAuthError(t.auth_error_invalid);
      return;
    }
    setCurrentOwner(found);
    setForm((f) => ({ ...f, name: found.businessName }));
  };

  const handleLogout = () => {
    setCurrentOwner(null);
    setAuthForm({ email: "", password: "", confirmPassword: "", businessName: "", website: "" });
    setAuthView("login");
    setAuthStartedAt(Date.now());
    // Reset the submission flow too, so the next owner to log in on this
    // session sees a fresh form instead of the previous owner's confirmation.
    setSubmitted(false);
    setForm({ name: "", city: "", cuisine: "turks", cuisineOther: "", description: "", video: "", website: "" });
    setFormStartedAt(Date.now());
  };

  const handleSendResetCode = (e) => {
    e.preventDefault();
    setAuthError("");
    const email = normalizeEmail(resetEmail);
    if (!ownersDB.some((o) => o.email === email)) {
      setAuthError(t.auth_error_invalid);
      return;
    }
    const code = String(Math.floor(1000 + Math.random() * 9000));
    setResetCode(code);
    setAuthView("reset");
  };

  const handleResetPassword = async (e) => {
    e.preventDefault();
    setAuthError("");
    if (resetCodeInput !== resetCode) {
      setAuthError(t.auth_error_code);
      return;
    }
    const email = normalizeEmail(resetEmail);
    const passwordHash = await sha256Hex(resetNewPassword);
    setOwnersDB((prev) => prev.map((o) => (o.email === email ? { ...o, passwordHash } : o)));
    setResetDone(true);
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (looksLikeSpam(form.website, formStartedAt)) return;
    if (!form.name || !form.city) return;
    setSubmitted(true);
  };

  return (
    <div dir={t.dir} style={{ background: PAPER, color: INK, minHeight: "100vh", paddingBottom: consentAccepted ? 0 : 56 }} className="font-sans wt-root">
      <FontStyles />
      <Header lang={lang} setLang={setLang} view={view} setView={setView} t={t} />

      {view === "discover" ? (
        <>
          <DiscoverView
            t={t} lang={lang}
            query={query} setQuery={setQuery}
            activeCuisine={activeCuisine} setActiveCuisine={setActiveCuisine}
            localReviews={localReviews} setLocalReviews={setLocalReviews}
            reviewDrafts={reviewDrafts} setReviewDrafts={setReviewDrafts}
            recordView={recordView} recordContactClick={recordContactClick}
          />
          <footer className="px-4 py-6 text-xs max-w-3xl mx-auto" style={{ borderTop: `2px solid ${INK}`, color: "#666" }}>
            <p>{t.footer_note}</p>
            <button onClick={() => setView("admin")} className="mt-3 inline-flex items-center gap-1 text-10 transition-colors hover:text-ink"
              style={{ color: "#ccc" }}>
              <Shield size={10} /> Admin
            </button>
          </footer>
        </>
      ) : view === "admin" ? (
        <AdminView
          t={t} lang={lang}
          adminAuthed={adminAuthed} adminPasswordInput={adminPasswordInput}
          setAdminPasswordInput={setAdminPasswordInput} adminError={adminError}
          handleAdminLogin={handleAdminLogin}
          ownersDB={ownersDB} setOwnerApproval={setOwnerApproval}
          setView={setView}
          analytics={analytics}
        />
      ) : currentOwner ? (
        <OwnerView
          t={t} form={form} setForm={setForm}
          handleSubmit={handleSubmit} submitted={submitted}
          lang={lang} currentOwner={currentOwner} handleLogout={handleLogout}
        />
      ) : (
        <AuthView
          t={t} authView={authView} setAuthView={setAuthView}
          authForm={authForm} setAuthForm={setAuthForm}
          authError={authError} setAuthError={setAuthError}
          handleSignup={handleSignup} handleLogin={handleLogin}
          resetEmail={resetEmail} setResetEmail={setResetEmail}
          handleSendResetCode={handleSendResetCode}
          resetCode={resetCode} resetCodeInput={resetCodeInput}
          setResetCodeInput={setResetCodeInput}
          resetNewPassword={resetNewPassword} setResetNewPassword={setResetNewPassword}
          handleResetPassword={handleResetPassword}
          resetDone={resetDone} setResetDone={setResetDone}
        />
      )}

      {!consentAccepted && <ConsentBanner t={t} onAccept={acceptConsent} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
(function() {
  function showError(title, detail) {
    var root = document.getElementById("root");
    root.innerHTML = "";
    var box = document.createElement("div");
    box.style.cssText = "padding:16px;font-family:monospace;font-size:12px;color:#A8462F;white-space:pre-wrap;line-height:1.5;";
    box.textContent = title + "\n\n" + (detail || "");
    root.appendChild(box);
  }
  window.addEventListener("error", function(e) {
    showError("JS Error: " + e.message, (e.error && e.error.stack) || (e.filename + ":" + e.lineno));
  });
  try {
    if (typeof Babel === "undefined") throw new Error("Babel did not load (CDN blocked?)");
    if (typeof React === "undefined") throw new Error("React did not load (CDN blocked?)");
    if (typeof LucideReact === "undefined") throw new Error("lucide-react did not load (CDN blocked?)");
    var srcEl = document.getElementById("app-source");
    var code = Babel.transform(srcEl.textContent, { presets: ["react"] }).code;
    (0, eval)(code);
  } catch (err) {
    showError("Startup error: " + err.message, err.stack);
  }
})();
</script>
</body>
</html>
